apiVersion: apps/v1
kind: Deployment
metadata:
  name: legendary-succotash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legendary-succotash
  template:
    metadata:
      labels:
        app: legendary-succotash
    spec:
      containers:
        - name: legendary-succotash
          image: dp487/legendary-succotash:latest
          ports:
            - containerPort: 8085
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DBNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_DBNAME
            - name: POSTGRES_HOST
              value: "postgresdb" # Name of the Postgres service
            - name: POSTGRES_PORT
              value: "5432"
---
apiVersion: v1
kind: Service
metadata:
  name: legendary-succotash
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: legendary-succotash
